services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: kg-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017/knowledge-graph}
      JWT_SECRET: ${JWT_SECRET:-tasha}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${FRONTEND_PORT:-80}}
    # Lets the container resolve "host.docker.internal" to the host machine,
    # needed on Linux (Docker Desktop on Mac/Windows already supports this).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-3000}}
    container_name: kg-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend