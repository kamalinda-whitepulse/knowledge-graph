services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: kg-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017/knowledge-graph}
      JWT_SECRET: ${JWT_SECRET:-tasha}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
    volumes:
      # Mount source for hot reload...
      - ./backend:/app
      # ...but keep node_modules from the image (avoids host/arch mismatches)
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: kg-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-3000}}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      